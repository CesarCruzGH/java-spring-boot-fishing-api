spring.application.name=api-pesca-merida
# Habilita la consola de H2 para que entres desde el navegador
spring.h2.console.enabled=true
spring.datasource.url=jdbc:h2:mem:pescayucatandb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
# Muestra en la consola de IntelliJ las consultas SQL que Spring hace por ti
spring.jpa.show-sql=true
#  JPA MUY IMPORTANTE
# NUNCA usar create o create-drop cuando Flyway estß activo.
# validate verifica que tus entidades coincidan con el esquema real.
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=false
spring.flyway.validate-on-migrate=true

# URLs de Google Sheets (Formato Exportaciˇn Directa a CSV)
ingestion.sheets.especies-url=https://docs.google.com/spreadsheets/d/1lrzoWe_YgU5S0UULppk8q33CSd26Gu82TiWxerKpqWQ/export?format=csv&gid=382368478
ingestion.sheets.vedas-url=https://docs.google.com/spreadsheets/d/1lrzoWe_YgU5S0UULppk8q33CSd26Gu82TiWxerKpqWQ/export?format=csv&gid=0

# Cron: Lunes a las 3 AM 0 0 3 * * MON
ingestion.cron=0 */1 * * * *

# Habilitar ingesta
ingestion.enabled=true

