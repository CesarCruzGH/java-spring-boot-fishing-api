# ============================================================
# PRODUCTION PROFILE - API Pesca Yucatán
# ============================================================
# Activar con: spring.profiles.active=prod
# ============================================================

spring.application.name=api-pesca-merida

# ─────────────────────────────────────────────────────────
# H2 CONSOLE - DISABLED IN PRODUCTION
# ─────────────────────────────────────────────────────────
spring.h2.console.enabled=false

# ─────────────────────────────────────────────────────────
# DATASOURCE - PRODUCTION DATABASE
# ─────────────────────────────────────────────────────────
# TODO: Configurar para base de datos de producción (MySQL/PostgreSQL)
# spring.datasource.url=jdbc:mysql://production-host:3306/pescayucatan
# spring.datasource.username=${DB_USERNAME}
# spring.datasource.password=${DB_PASSWORD}

# ─────────────────────────────────────────────────────────
# HTTPS CONFIGURATION
# ─────────────────────────────────────────────────────────
# Puerto 443 (estándar HTTPS)
server.port=443

# Habilitar SSL/TLS
server.ssl.enabled=true

# Keystore containing the certificate and private key
# Generar con: keytool -genkeypair -alias api-pesca -keyalg RSA -keysize 2048 \
#             -keystore keystore.p12 -storepass ${SSL_KEY_PASSWORD} \
#             -validity 3650 -storetype PKCS12
server.ssl.key-store=classpath:keystore.p12
server.ssl.key-store-password=${SSL_KEY_PASSWORD}

# Tipo de keystore
server.ssl.key-store-type=PKCS12

# Alias del certificado en el keystore
server.ssl.key-alias=api-pesca

# ─────────────────────────────────────────────────────────
# HTTP TO HTTPS REDIRECT (Optional)
# ─────────────────────────────────────────────────────────
# Descomentar para redirigir HTTP → HTTPS
# server.http-port=80

# ─────────────────────────────────────────────────────────
# JPA
# ─────────────────────────────────────────────────────────
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

# ─────────────────────────────────────────────────────────
# FLYWAY - PRODUCTION
# ─────────────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=false
spring.flyway.validate-on-migrate=true

# ─────────────────────────────────────────────────────────
# CORS - RESTRICTIVE IN PRODUCTION
# ─────────────────────────────────────────────────────────
cors.allowed.origins=https://pesca-merida.com

# ─────────────────────────────────────────────────────────
# Actuator - SECURE IN PRODUCTION
# ─────────────────────────────────────────────────────────
# No exponer métricas públicamente en producción
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when_authorized

# ─────────────────────────────────────────────────────────
# LOGGING - PRODUCTION LEVEL
# ─────────────────────────────────────────────────────────
logging.level.root=INFO
logging.level.com.pescayucatan=INFO
logging.level.org.springframework.security=WARN
